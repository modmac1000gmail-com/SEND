.6) rotate(10)'/%3E%3C/g%3E%3C/defs%3E%3Cg transform='translate(1000 750)'%3E%3Cuse href='%23s' transform='scale(1.0)'/%3E%3Cuse href='%23g' transform='scale(1.0)'/%3E%3C/g%3E%3C/svg%3E");
            background-size: cover;

        .button-gradient {

<body class="bg-pattern min-h-screen">
    <!-- القائمة العلوية -->
    <nav class="glass-card fixed top-0 w-full z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">

    <!-- المحتوى الرئيسي -->
    <main class="pt-24 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto">

            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4">المناسبات المتاحة</h2>
                <p class="text-gray-600 text-lg">اختر المناسبة التي تود حضورها وسجل حضورك الآن</p>

            <!-- شبكة المناسبات -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="eventsGrid">
                <!-- سيتم إضافة المناسبات هنا -->
            </div>
        </div>
    </main>

    <!-- نموذج التسجيل -->
    <div id="registrationModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 px-4">
        <div class="glass-card rounded-2xl p-6 md:p-8 max-w-md w-full mx-auto animate-float">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">تسجيل الحضور</h3>
                <button onclick="closeRegistrationModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="registrationForm" class="space-y-6">
                <input type="hidden" id="eventId">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">الاسم الكامل</label>
                    <input type="text" id="fullName" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">رقم الجوال</label>
                    <input type="tel" id="phoneNumber" required pattern="[0-9]{10}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="05xxxxxxxx">
                </div>
                <button type="submit" class="w-full button-gradient text-white px-6 py-3 rounded-xl font-bold">
                    تأكيد التسجيل
                </button>
            </form>
        </div>
    </div>

    <script>
     // تحديث تهيئة Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAuQ-Icok0gl5C31ElazN9RrZz99vJ79LQ",
    authDomain: "dfhdsds-514ec.firebaseapp.com",
    projectId: "dfhdsds-514ec",
    storageBucket: "dfhdsds-514ec.firebasestorage.app",
    messagingSenderId: "972581116542",
    appId: "1:972581116542:web:c1906d0d75dffc5fb4562f",
    measurementId: "G-79499LG545"
};

// تأكد من عدم تكرار التهيئة
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
} else {
    firebase.app();
}

const db = firebase.firestore();

// تحميل المناسبات
async function loadEvents() {
    const eventsGrid = document.getElementById('eventsGrid');
    eventsGrid.innerHTML = '<div class="col-span-full text-center"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500 mx-auto"></div></div>';

    try {
        // إنشاء تاريخ اليوم في بداية اليوم (00:00:00)
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const snapshot = await db.collection('events')
            .orderBy('date', 'asc')
            .get();

        if (snapshot.empty) {
            eventsGrid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <p class="text-gray-600 text-lg">لا توجد مناسبات متاحة حالياً</p>
                </div>
            `;
            return;
        }

        let eventsHTML = '';
        snapshot.forEach(doc => {
            const event = doc.data();
            // تحويل التاريخ إلى كائن Date
            let eventDate;
            if (event.date instanceof firebase.firestore.Timestamp) {
                eventDate = event.date.toDate();
            } else if (typeof event.date === 'string') {
                eventDate = new Date(event.date);
            } else {
                eventDate = new Date(event.date.seconds * 1000);
            }

            // عرض المناسبة فقط إذا كان تاريخها اليوم أو في المستقبل
            if (eventDate >= today) {
                eventsHTML += `
                    <div class="glass-card rounded-2xl overflow-hidden hover-scale card-shadow">
                        <div class="relative">
                            <img src="${event.image || 'https://via.placeholder.com/400x200?text=No+Image'}" 
                                class="w-full h-48 object-cover" 
                                alt="${event.title || 'مناسبة'}"
                                onerror="this.src='https://via.placeholder.com/400x200?text=Error+Loading+Image'">
                            <div class="absolute top-4 left-4">
                                <span class="px-3 py-1 bg-white bg-opacity-90 rounded-full text-sm font-medium text-gray-700">
                                    ${eventDate.toLocaleDateString('ar-SA')}
                                </span>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${event.title || 'مناسبة بدون عنوان'}</h3>
                            <p class="text-gray-600 mb-4 line-clamp-2">${event.description || 'لا يوجد وصف'}</p>
                            <div class="flex items-center text-gray-600 mb-4">
                                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                </svg>
                                <span class="text-sm">${event.location || 'الموقع غير محدد'}</span>
                            </div>
                            <button onclick="handleEventRegistration('${doc.id}')" 
                                class="w-full button-gradient text-white px-4 py-2 rounded-xl font-bold">
                                تسجيل الحضور
                            </button>
                        </div>
                    </div>
                `;
            }
        });

        if (eventsHTML === '') {
            eventsGrid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <p class="text-gray-600 text-lg">لا توجد مناسبات متاحة حالياً</p>
                </div>
            `;
        } else {
            eventsGrid.innerHTML = eventsHTML;
        }

    } catch (error) {
        console.error("Error loading events:", error);
        eventsGrid.innerHTML = `
            <div class="col-span-full text-center py-12">
                <div class="bg-red-100 text-red-700 p-4 rounded-lg inline-block">
                    <p class="font-bold">حدث خطأ في تحميل المناسبات</p>
                    <button onclick="loadEvents()" class="mt-2 text-sm underline">إعادة المحاولة</button>
                </div>
            </div>
        `;
    }
}







// معالجة تسجيل الحضور
function handleEventRegistration(eventId) {
    Swal.fire({
        title: 'تسجيل الحضور',
        html: `
            <div class="p-4">
                <div class="mb-6">
                    <div class="relative mb-4">
                        <label class="block text-sm font-medium text-gray-700 text-right mb-2">
                            الاسم الكامل
                        </label>
                        <input type="text" 
                            id="fullName" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-purple-500 focus:ring focus:ring-purple-200 transition-all duration-300 text-right"
                            placeholder="أدخل اسمك الكامل"
                            dir="rtl">
                        <div class="absolute inset-y-0 right-0 top-7 flex items-center pr-3 pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 text-right mb-2">
                            رقم الجوال
                        </label>
                        <input type="tel" 
                            id="phoneNumber" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-purple-500 focus:ring focus:ring-purple-200 transition-all duration-300 text-right"
                            placeholder="05xxxxxxxx"
                            dir="rtl">
                        <div class="absolute inset-y-0 right-0 top-7 flex items-center pr-3 pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'تسجيل',
        cancelButtonText: 'إلغاء',
        confirmButtonColor: '#8B5CF6',
        cancelButtonColor: '#EF4444',
        customClass: {
            popup: 'animated fadeInDown faster',
            container: 'custom-container',
            confirmButton: 'custom-confirm-button',
            cancelButton: 'custom-cancel-button'
        },
        showClass: {
            popup: 'animate__animated animate__fadeInDown animate__faster'
        },
        hideClass: {
            popup: 'animate__animated animate__fadeOutUp animate__faster'
        },
        preConfirm: () => {
            const fullName = Swal.getPopup().querySelector('#fullName').value;
            const phoneNumber = Swal.getPopup().querySelector('#phoneNumber').value;

            // التحقق من الحقول
            if (!fullName.trim()) {
                Swal.showValidationMessage('الرجاء إدخال الاسم الكامل');
                return false;
            }

            if (!phoneNumber.trim()) {
                Swal.showValidationMessage('الرجاء إدخال رقم الجوال');
                return false;
            }

            // التحقق من صحة رقم الجوال
            const phoneRegex = /^05[0-9]{8}$/;
            if (!phoneRegex.test(phoneNumber)) {
                Swal.showValidationMessage('رقم الجوال غير صحيح، يجب أن يبدأ ب 05 ويتكون من 10 أرقام');
                return false;
            }

            return { fullName, phoneNumber };
        }
    }).then(async (result) => {
        if (result.isConfirmed) {
            try {
                // التحقق من عدم وجود تسجيل سابق
                const existingReg = await db.collection('invitations')
                    .where('eventId', '==', eventId)
                    .where('phoneNumber', '==', result.value.phoneNumber)
                    .get();

                if (!existingReg.empty) {
                    Swal.fire({
                        title: 'تنبيه',
                        text: 'لقد قمت بالتسجيل مسبقاً في هذه المناسبة',
                        icon: 'warning',
                        confirmButtonText: 'حسناً',
                        confirmButtonColor: '#8B5CF6'
                    });
                    return;
                }

                // إضافة التسجيل الجديد
                await db.collection('invitations').add({
                    eventId,
                    fullName: result.value.fullName,
                    phoneNumber: result.value.phoneNumber,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // حفظ رقم الجوال في localStorage
                localStorage.setItem('userPhone', result.value.phoneNumber);

                // عرض رسالة النجاح
                Swal.fire({
                    icon: 'success',
                    title: 'تم التسجيل بنجاح',
                    text: 'سيتم مراجعة طلبك والرد عليك قريباً',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true,
                    customClass: {
                        popup: 'animated fadeInDown faster'
                    }
                });

                // تحديث عرض المناسبات
                loadEvents();

            } catch (error) {
                console.error('Registration error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'عذراً',
                    text: 'حدث خطأ أثناء التسجيل، يرجى المحاولة مرة أخرى',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#8B5CF6'
                });
            }
        }
    });
}

// إضافة الأنماط المخصصة للنافذة المنبثقة
const style = document.createElement('style');
style.textContent = `
    .custom-container {
        backdrop-filter: blur(10px);
    }

        border-bottom: 1px solid #E5E7EB;
    }

    .custom-confirm-button,
    .custom-cancel-button {
        padding: 0.75rem 2rem;
        font-weight: 600;
        border-radius: 0.5rem;
        transition: all 0.3s ease;
    }

    .custom-confirm-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .custom-cancel-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .animated {
        animation-duration: 0.5s;
        animation-fill-mode: both;
    }

    .fadeInDown {
        animation-name: fadeInDown;
    }

    @keyframes fadeInDown {

    }
`;
document.head.appendChild(style);









// إضافة مستمع للتحميل الأولي
document.addEventListener('DOMContentLoaded', () => {
    // محاولة تحميل المناسبات
    loadEvents();
    
    // إضافة مستمع لنموذج التسجيل
    const form = document.getElementById('registrationForm');
    if (form) {
        form.addEventListener('submit', handleRegistrationSubmit);
    }

    // مراقبة التغييرات في قاعدة البيانات
    try {
        db.collection('events').onSnapshot(() => {
            loadEvents();
        }, (error) => {
            console.error("Error in realtime updates:", error);
        });
    } catch (error) {
        console.error("Error setting up realtime updates:", error);
    }
});
    </script>
