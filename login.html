<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام الدعوات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        .animate-gradient {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="animate-gradient min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="glassmorphism rounded-3xl p-8 shadow-xl">
            <!-- رأس الصفحة -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-gray-800 mb-2">تسجيل الدخول</h1>
                <p class="text-gray-600">سجل دخولك للوصول إلى كافة المميزات</p>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">البريد الإلكتروني</label>
                    <input type="email" id="email" 
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                        placeholder="أدخل بريدك الإلكتروني">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">كلمة المرور</label>
                    <input type="password" id="password"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                        placeholder="أدخل كلمة المرور">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition">
                    تسجيل الدخول
                </button>

                <!-- أو -->
                <div class="relative flex items-center justify-center my-6">
                    <div class="absolute border-t border-gray-300 w-full"></div>
                    <div class="relative bg-white px-4 text-gray-500">أو</div>
                </div>

                <!-- تسجيل الدخول باستخدام Google -->
                <button type="button" onclick="signInWithGoogle()"
                    class="w-full bg-white border-2 border-gray-200 text-gray-800 font-bold py-3 px-4 rounded-xl hover:bg-gray-50 transition flex items-center justify-center space-x-2 space-x-reverse">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                    <span>تسجيل الدخول باستخدام Google</span>
                </button>

                <!-- رابط إنشاء حساب جديد -->
                <div class="text-center mt-6">
                    <p class="text-gray-600">
                        ليس لديك حساب؟
                        <button type="button" onclick="showRegisterForm()" class="text-indigo-600 font-bold hover:text-indigo-700">
                            إنشاء حساب جديد
                        </button>
                    </p>
                </div>
            </form>

            <!-- نموذج إنشاء حساب جديد -->
            <form id="registerForm" class="space-y-6 hidden">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">الاسم الكامل</label>
                    <input type="text" id="regName" 
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                        placeholder="أدخل اسمك الكامل">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" 
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                        placeholder="أدخل بريدك الإلكتروني">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">كلمة المرور</label>
                    <input type="password" id="regPassword"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition"
                        placeholder="أدخل كلمة المرور">
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition">
                    إنشاء حساب
                </button>

                <!-- رابط العودة لتسجيل الدخول -->
                <div class="text-center mt-6">
                    <p class="text-gray-600">
                        لديك حساب بالفعل؟
                        <button type="button" onclick="showLoginForm()" class="text-indigo-600 font-bold hover:text-indigo-700">
                            تسجيل الدخول
                        </button>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAuQ-Icok0gl5C31ElazN9RrZz99vJ79LQ",
            authDomain: "dfhdsds-514ec.firebaseapp.com",
            projectId: "dfhdsds-514ec",
            storageBucket: "dfhdsds-514ec.firebasestorage.app",
            messagingSenderId: "972581116542",
            appId: "1:972581116542:web:c1906d0d75dffc5fb4562f",
            measurementId: "G-79499LG545"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();

        // تبديل النماذج
        function showRegisterForm() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLoginForm() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // تسجيل الدخول باستخدام البريد وكلمة المرور
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                alert('خطأ في تسجيل الدخول: ' + error.message);
            }
        });

        // إنشاء حساب جديد
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                window.location.href = 'index.html';
            } catch (error) {
                alert('خطأ في إنشاء الحساب: ' + error.message);
            }
        });

        // تسجيل الدخول باستخدام Google
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                window.location.href = 'index.html';
            } catch (error) {
                alert('خطأ في تسجيل الدخول باستخدام Google: ' + error.message);
            }
        }

        // التحقق من حالة تسجيل الدخول
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
